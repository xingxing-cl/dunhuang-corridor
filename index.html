<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>敦煌时空走廊 - 壁画上色交互体验</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            overflow: hidden;
            background: #1a0a00;
            font-family: "Microsoft YaHei", sans-serif;
            cursor: none;
        }
        #main-container {
            position: relative;
            width: 100vw;
            height: 100vh;
            overflow: hidden;
        }
        /* 底层：上色壁画视频 */
        #colored-video {
            position: absolute;
            top: 0; left: 0;
            width: 100%; height: 100%;
            object-fit: cover;
            z-index: 1;
        }
        /* 上层：线稿Canvas */
        #lineart-canvas {
            position: absolute;
            top: 0; left: 0;
            width: 100%; height: 100%;
            z-index: 2;
        }
        /* 刮擦画布 */
        #scratch-canvas {
            position: absolute;
            top: 0; left: 0;
            width: 100%; height: 100%;
            z-index: 3;
            pointer-events: none;
            opacity: 0;
        }
        /* 粒子画布 */
        #particle-canvas {
            position: absolute;
            top: 0; left: 0;
            width: 100%; height: 100%;
            z-index: 4;
            pointer-events: none;
        }
        /* 光点画布 */
        #ambient-canvas {
            position: absolute;
            top: 0; left: 0;
            width: 100%; height: 100%;
            z-index: 5;
            pointer-events: none;
        }
        /* 点击特效 */
        #click-canvas {
            position: absolute;
            top: 0; left: 0;
            width: 100%; height: 100%;
            z-index: 6;
            pointer-events: none;
        }
        /* 画笔光标 - 唯美高级设计 */
        #custom-cursor {
            position: fixed;
            width: 48px; height: 48px;
            pointer-events: none;
            z-index: 1000;
            transform: translate(-20%, -10%);
            transition: transform 0.15s ease;
            filter: drop-shadow(0 3px 8px rgba(212,175,55,0.4));
        }
        #custom-cursor svg {
            width: 100%; height: 100%;
            overflow: visible;
        }
        #custom-cursor.dragging {
            transform: translate(-20%, -10%) scale(1.2);
            filter: drop-shadow(0 5px 15px rgba(212,175,55,0.6));
        }
        #title-overlay {
            position: absolute;
            top: 30px; left: 50%;
            transform: translateX(-50%);
            z-index: 10;
            text-align: center;
            pointer-events: none;
            opacity: 0.9;
        }
        #title-overlay h1 {
            font-size: 2.5rem;
            color: #d4af37;
            text-shadow: 0 0 10px rgba(212,175,55,0.5), 0 0 30px rgba(212,175,55,0.3), 2px 2px 4px rgba(0,0,0,0.5);
            letter-spacing: 0.3em;
            font-weight: 300;
        }
        #title-overlay p {
            color: rgba(212,175,55,0.7);
            font-size: 1rem;
            margin-top: 8px;
            letter-spacing: 0.2em;
        }
        #hint {
            position: absolute;
            bottom: 40px; left: 50%;
            transform: translateX(-50%);
            z-index: 10;
            color: rgba(212,175,55,0.6);
            font-size: 0.9rem;
            letter-spacing: 0.15em;
            pointer-events: none;
            animation: pulse 3s ease-in-out infinite;
        }
        @keyframes pulse {
            0%, 100% { opacity: 0.4; }
            50% { opacity: 0.9; }
        }
        #audio-controls {
            position: absolute;
            bottom: 30px; right: 30px;
            z-index: 10;
            display: flex;
            gap: 10px;
            align-items: center;
        }
        .audio-btn {
            background: rgba(139,90,43,0.4);
            border: 1px solid rgba(212,175,55,0.4);
            color: #d4af37;
            padding: 8px 16px;
            border-radius: 20px;
            cursor: pointer;
            font-size: 0.8rem;
            letter-spacing: 0.1em;
            transition: all 0.3s;
            backdrop-filter: blur(5px);
        }
        .audio-btn:hover {
            background: rgba(139,90,43,0.6);
            border-color: rgba(212,175,55,0.8);
            box-shadow: 0 0 15px rgba(212,175,55,0.3);
        }
    </style>
<base target="_blank">
</head>
<body>
    <div id="main-container">
        <!-- 底层：上色壁画视频 -->
        <video id="colored-video" muted loop playsinline crossorigin="anonymous">
            <source src="assets/videos/colored.mp4" type="video/mp4">
        </video>

        <!-- 上层：线稿Canvas -->
        <canvas id="lineart-canvas"></canvas>

        <!-- 刮擦画布 -->
        <canvas id="scratch-canvas"></canvas>

        <!-- 粒子画布 -->
        <canvas id="particle-canvas"></canvas>

        <!-- 光点画布 -->
        <canvas id="ambient-canvas"></canvas>

        <!-- 点击特效 -->
        <canvas id="click-canvas"></canvas>

        <!-- 标题 -->
        <div id="title-overlay">
            <h1>敦煌时空走廊</h1>
            <p>按住画笔滑动，为千年壁画上色</p>
        </div>

        <!-- 提示 -->
        <div id="hint">✦ 按住画笔滑动为线稿上色 · 点击画面弹奏古音 ✦</div>

        <!-- 音频控制 -->
        <div id="audio-controls">
            <button class="audio-btn" id="bgm-btn">🎵 背景音乐</button>
            <button class="audio-btn" id="sfx-btn">🎹 音效: 开</button>
        </div>

        <!-- 画笔光标 - 唯美高级设计 -->
        <div id="custom-cursor">
            <svg viewBox="0 0 100 100" xmlns="http://www.w3.org/2000/svg">
                <defs>
                    <linearGradient id="brushGrad" x1="0%" y1="0%" x2="100%" y2="100%">
                        <stop offset="0%" style="stop-color:#D4AF37;stop-opacity:1" />
                        <stop offset="50%" style="stop-color:#B8860B;stop-opacity:1" />
                        <stop offset="100%" style="stop-color:#8B6914;stop-opacity:1" />
                    </linearGradient>
                    <linearGradient id="tipGrad" x1="0%" y1="0%" x2="0%" y2="100%">
                        <stop offset="0%" style="stop-color:#2C1810;stop-opacity:1" />
                        <stop offset="100%" style="stop-color:#1A0F0A;stop-opacity:1" />
                    </linearGradient>
                    <filter id="glow">
                        <feGaussianBlur stdDeviation="2" result="coloredBlur"/>
                        <feMerge>
                            <feMergeNode in="coloredBlur"/>
                            <feMergeNode in="SourceGraphic"/>
                        </feMerge>
                    </filter>
                </defs>
                <!-- 笔杆 - 优雅的细长形状 -->
                <path d="M45 15 L48 12 L52 12 L55 15 L52 55 L48 55 Z" fill="url(#brushGrad)" stroke="#D4AF37" stroke-width="0.5" filter="url(#glow)"/>
                <!-- 笔杆装饰环 -->
                <rect x="47" y="20" width="6" height="2" fill="#8B0000" rx="0.5"/>
                <rect x="47" y="24" width="6" height="1" fill="#D4AF37" rx="0.3"/>
                <!-- 笔杆纹理 -->
                <line x1="49" y1="28" x2="49" y2="50" stroke="#B8860B" stroke-width="0.3" opacity="0.5"/>
                <line x1="51" y1="28" x2="51" y2="50" stroke="#B8860B" stroke-width="0.3" opacity="0.5"/>
                <!-- 笔头金属箍 -->
                <path d="M48 55 L52 55 L53 62 L47 62 Z" fill="#C0C0C0" stroke="#A0A0A0" stroke-width="0.3"/>
                <!-- 笔毛 -->
                <path d="M47 62 L53 62 L55 72 Q50 78 45 72 Z" fill="url(#tipGrad)" stroke="#1A0F0A" stroke-width="0.3"/>
                <!-- 笔尖高光 -->
                <path d="M48 64 L52 64 L53 70 Q50 74 47 70 Z" fill="#3D2317" opacity="0.6"/>
                <!-- 飘带装饰 -->
                <path d="M52 18 Q60 22 58 30 Q56 35 52 32" fill="none" stroke="#D4AF37" stroke-width="0.8" opacity="0.7"/>
                <path d="M48 18 Q40 22 42 30 Q44 35 48 32" fill="none" stroke="#D4AF37" stroke-width="0.8" opacity="0.7"/>
                <!-- 墨滴 -->
                <circle cx="50" cy="78" r="1.5" fill="#1A0F0A" opacity="0.8"/>
                <circle cx="52" cy="81" r="1" fill="#1A0F0A" opacity="0.5"/>
            </svg>
        </div>
    </div>

    <!-- 背景音乐 -->
    <audio id="bgm" loop>
        <source src="assets/audio/lv_0_20260630092821.mp3" type="audio/mpeg">
    </audio>

    <script>
    // ==================== 初始化 ====================
    const container = document.getElementById('main-container');
    const coloredVideo = document.getElementById('colored-video');
    const lineartCanvas = document.getElementById('lineart-canvas');
    const scratchCanvas = document.getElementById('scratch-canvas');
    const particleCanvas = document.getElementById('particle-canvas');
    const ambientCanvas = document.getElementById('ambient-canvas');
    const clickCanvas = document.getElementById('click-canvas');
    const customCursor = document.getElementById('custom-cursor');
    const bgm = document.getElementById('bgm');
    const bgmBtn = document.getElementById('bgm-btn');
    const sfxBtn = document.getElementById('sfx-btn');

    const lineartCtx = lineartCanvas.getContext('2d', { willReadFrequently: true });
    const scratchCtx = scratchCanvas.getContext('2d', { willReadFrequently: true });
    const particleCtx = particleCanvas.getContext('2d');
    const ambientCtx = ambientCanvas.getContext('2d');
    const clickCtx = clickCanvas.getContext('2d');

    let width, height;
    let isDragging = false;
    let lastX = 0, lastY = 0;
    let mouseX = 0, mouseY = 0;
    let sfxEnabled = true;
    let bgmPlaying = false;

    // 敦煌配色
    const PARTICLE_COLORS = [
        '#D4AF37', '#FFD700', '#2E8B9E', '#40E0D0', '#CC7722',
        '#E34234', '#F5E6D3', '#8B0000', '#FF6B6B', '#FFE66D',
        '#4ECDC4', '#FF8C42'
    ];

    // 调整画布大小
    function resize() {
        width = window.innerWidth;
        height = window.innerHeight;

        [lineartCanvas, scratchCanvas, particleCanvas, ambientCanvas, clickCanvas].forEach(canvas => {
            canvas.width = width;
            canvas.height = height;
        });

        console.log(`📐 Canvas 尺寸已设置: ${width}x${height}`);

        // 初始化 scratchCanvas 为全白（白色=不透明，显示线稿层）
        scratchCtx.fillStyle = '#FFFFFF';
        scratchCtx.fillRect(0, 0, width, height);
    }

    window.addEventListener('resize', () => {
        resize();
        scratchCtx.fillStyle = '#FFFFFF';
        scratchCtx.fillRect(0, 0, width, height);
    });
    resize();

    // ==================== 视频加载与同步 ====================
    // 线稿视频（上层）
    const lineartVideo = document.createElement('video');
    lineartVideo.muted = true;
    lineartVideo.loop = true;
    lineartVideo.playsInline = true;
    lineartVideo.crossOrigin = 'anonymous';
    lineartVideo.src = 'assets/videos/lineart.mp4';

    let lineartReady = false;
    let coloredReady = false;
    let videosSynced = false;

    // 同步两个视频的播放时间
    function syncVideos() {
        if (!lineartReady || !coloredReady || videosSynced) return;

        // 以 coloredVideo 为基准，同步 lineartVideo
        const targetTime = coloredVideo.currentTime;
        lineartVideo.currentTime = targetTime;

        console.log(`🔄 视频已同步到: ${targetTime.toFixed(2)}秒`);
        videosSynced = true;
    }

    // 持续同步（防止漂移）
    function maintainSync() {
        if (!lineartReady || !coloredReady) return;

        const diff = Math.abs(lineartVideo.currentTime - coloredVideo.currentTime);
        if (diff > 0.1) {
            // 如果差距超过0.1秒，重新同步
            lineartVideo.currentTime = coloredVideo.currentTime;
            console.log(`🔄 重新同步视频，差距: ${diff.toFixed(3)}秒`);
        }
    }

    lineartVideo.addEventListener('loadeddata', () => {
        lineartReady = true;
        console.log('✅ 线稿视频已加载');
        lineartVideo.play().catch(e => console.log('视频播放失败:', e));
        syncVideos();
        checkReady();
    });

    coloredVideo.addEventListener('loadeddata', () => {
        coloredReady = true;
        console.log('✅ 上色壁画视频已加载');
        coloredVideo.play().catch(e => console.log('视频播放失败:', e));
        syncVideos();
        checkReady();
    });

    // 错误处理
    lineartVideo.addEventListener('error', (e) => {
        console.error('❌ 线稿视频加载失败:', e);
    });
    coloredVideo.addEventListener('error', (e) => {
        console.error('❌ 上色壁画视频加载失败:', e);
    });

    function checkReady() {
        if (lineartReady && coloredReady) {
            console.log('✅ 两个视频都已加载，开始渲染');
            startRenderLoop();
        }
    }

    // 如果已经加载完成（缓存情况）
    if (lineartVideo.readyState >= 3) {
        lineartReady = true;
        lineartVideo.play().catch(e => console.log('视频播放失败:', e));
    }
    if (coloredVideo.readyState >= 3) {
        coloredReady = true;
        coloredVideo.play().catch(e => console.log('视频播放失败:', e));
    }
    if (lineartReady && coloredReady) {
        syncVideos();
        startRenderLoop();
    }

    // 绘制线稿帧
    function drawLineartFrame() {
        if (!lineartReady || !lineartVideo.videoWidth) return;

        if (width === 0 || height === 0) {
            console.warn('Canvas 尺寸为 0，跳过绘制');
            return;
        }

        // 直接绘制线稿视频帧
        lineartCtx.drawImage(lineartVideo, 0, 0, width, height);
    }

    // ==================== 刮擦效果（羽化边缘，无发光） ====================
    function scratch(x, y, prevX, prevY) {
        const brushSize = 80;

        const dist = Math.hypot(x - prevX, y - prevY);
        const steps = Math.max(1, Math.floor(dist / 3));

        for (let i = 0; i <= steps; i++) {
            const t = i / steps;
            const cx = prevX + (x - prevX) * t;
            const cy = prevY + (y - prevY) * t;

            // 羽化边缘的径向渐变
            const gradient = scratchCtx.createRadialGradient(cx, cy, 0, cx, cy, brushSize);
            gradient.addColorStop(0, 'rgba(0,0,0,1)');
            gradient.addColorStop(0.2, 'rgba(0,0,0,0.95)');
            gradient.addColorStop(0.5, 'rgba(0,0,0,0.6)');
            gradient.addColorStop(0.8, 'rgba(0,0,0,0.2)');
            gradient.addColorStop(1, 'rgba(0,0,0,0)');

            scratchCtx.globalCompositeOperation = 'source-over';
            scratchCtx.fillStyle = gradient;
            scratchCtx.beginPath();
            scratchCtx.arc(cx, cy, brushSize, 0, Math.PI * 2);
            scratchCtx.fill();

            spawnScratchParticles(cx, cy);
        }
    }

    // ==================== 粒子系统 ====================
    let particles = [];
    let ambientParticles = [];
    let clickEffects = [];

    class Particle {
        constructor(x, y, type = 'scratch') {
            this.x = x;
            this.y = y;
            this.type = type;

            const angle = Math.random() * Math.PI * 2;
            const speed = type === 'scratch' ? Math.random() * 3 + 0.8 : Math.random() * 1.5 + 0.3;

            this.vx = Math.cos(angle) * speed;
            this.vy = Math.sin(angle) * speed - (type === 'scratch' ? 1 : 0);

            this.life = 1;
            this.decay = type === 'scratch' ? Math.random() * 0.018 + 0.008 : Math.random() * 0.007 + 0.003;

            this.size = type === 'scratch' ? Math.random() * 3 + 1 : Math.random() * 2.5 + 0.8;
            this.maxSize = this.size;

            this.color = PARTICLE_COLORS[Math.floor(Math.random() * PARTICLE_COLORS.length)];
            this.rotation = Math.random() * Math.PI * 2;
            this.rotationSpeed = (Math.random() - 0.5) * 0.12;

            this.petalCount = Math.floor(Math.random() * 3) + 3;
            this.shape = Math.random() > 0.6 ? 'circle' : 'petal';
        }

        update() {
            this.x += this.vx;
            this.y += this.vy;
            this.vy += 0.03;
            this.vx *= 0.99;
            this.life -= this.decay;
            this.rotation += this.rotationSpeed;

            if (this.life > 0.7) {
                this.size = this.maxSize * (1 - (this.life - 0.7) / 0.3 * 0.3);
            } else {
                this.size = this.maxSize * 0.7 * this.life / 0.7;
            }
        }

        draw(ctx) {
            ctx.save();
            ctx.translate(this.x, this.y);
            ctx.rotate(this.rotation);
            ctx.globalAlpha = this.life * 0.7;

            if (this.shape === 'petal' && this.type === 'release') {
                for (let i = 0; i < this.petalCount; i++) {
                    ctx.save();
                    ctx.rotate((Math.PI * 2 / this.petalCount) * i);
                    ctx.beginPath();
                    ctx.ellipse(0, -this.size, this.size * 0.3, this.size * 0.6, 0, 0, Math.PI * 2);
                    ctx.fillStyle = this.color;
                    ctx.fill();
                    ctx.restore();
                }
            } else {
                const gradient = ctx.createRadialGradient(0, 0, 0, 0, 0, this.size * 1.6);
                gradient.addColorStop(0, this.color);
                gradient.addColorStop(0.5, this.color + '80');
                gradient.addColorStop(1, this.color + '00');

                ctx.beginPath();
                ctx.arc(0, 0, this.size * 1.6, 0, Math.PI * 2);
                ctx.fillStyle = gradient;
                ctx.fill();

                ctx.beginPath();
                ctx.arc(0, 0, this.size * 0.35, 0, Math.PI * 2);
                ctx.fillStyle = '#FFFFFF';
                ctx.globalAlpha = this.life * 0.5;
                ctx.fill();
            }

            ctx.restore();
        }
    }

    class AmbientParticle {
        constructor() {
            this.reset();
        }

        reset() {
            this.x = Math.random() * width;
            this.y = Math.random() * height;
            this.size = Math.random() * 1.2 + 0.2;
            this.speedX = (Math.random() - 0.5) * 0.15;
            this.speedY = (Math.random() - 0.5) * 0.15 - 0.03;
            this.life = Math.random() * 0.35 + 0.15;
            this.maxLife = this.life;
            this.pulseSpeed = Math.random() * 0.012 + 0.006;
            this.pulseOffset = Math.random() * Math.PI * 2;
        }

        update() {
            this.x += this.speedX;
            this.y += this.speedY;
            this.life -= 0.0015;

            if (this.life <= 0 || this.x < -50 || this.x > width + 50 || this.y < -50 || this.y > height + 50) {
                this.reset();
            }
        }

        draw(ctx) {
            const pulse = Math.sin(Date.now() * this.pulseSpeed + this.pulseOffset) * 0.3 + 0.7;
            const alpha = (this.life / this.maxLife) * pulse * 0.35;

            ctx.save();
            ctx.globalAlpha = alpha;

            const gradient = ctx.createRadialGradient(this.x, this.y, 0, this.x, this.y, this.size * 2.5);
            gradient.addColorStop(0, 'rgba(255, 215, 0, 0.5)');
            gradient.addColorStop(0.5, 'rgba(212, 175, 55, 0.15)');
            gradient.addColorStop(1, 'rgba(212, 175, 55, 0)');

            ctx.beginPath();
            ctx.arc(this.x, this.y, this.size * 2.5, 0, Math.PI * 2);
            ctx.fillStyle = gradient;
            ctx.fill();

            ctx.beginPath();
            ctx.arc(this.x, this.y, this.size * 0.5, 0, Math.PI * 2);
            ctx.fillStyle = 'rgba(255, 248, 220, 0.6)';
            ctx.fill();

            ctx.restore();
        }
    }

    class ClickEffect {
        constructor(x, y) {
            this.x = x;
            this.y = y;
            this.life = 1;
            this.decay = 0.025;
            this.rings = [];

            for (let i = 0; i < 3; i++) {
                this.rings.push({
                    radius: 0,
                    maxRadius: 25 + i * 15,
                    delay: i * 4,
                    color: PARTICLE_COLORS[Math.floor(Math.random() * PARTICLE_COLORS.length)]
                });
            }

            this.burstParticles = [];
            for (let i = 0; i < 10; i++) {
                const angle = (Math.PI * 2 / 10) * i + Math.random() * 0.3;
                const speed = Math.random() * 3 + 1.5;
                this.burstParticles.push({
                    x: x, y: y,
                    vx: Math.cos(angle) * speed,
                    vy: Math.sin(angle) * speed,
                    size: Math.random() * 2.5 + 1.2,
                    color: PARTICLE_COLORS[Math.floor(Math.random() * PARTICLE_COLORS.length)],
                    life: 1,
                    decay: Math.random() * 0.025 + 0.015
                });
            }
        }

        update() {
            this.life -= this.decay;

            this.rings.forEach(ring => {
                if (ring.delay > 0) {
                    ring.delay--;
                } else {
                    ring.radius += (ring.maxRadius - ring.radius) * 0.1;
                }
            });

            this.burstParticles.forEach(p => {
                p.x += p.vx;
                p.y += p.vy;
                p.vy += 0.05;
                p.vx *= 0.98;
                p.life -= p.decay;
            });
        }

        draw(ctx) {
            ctx.save();
            ctx.globalAlpha = this.life;

            this.rings.forEach(ring => {
                if (ring.delay <= 0) {
                    ctx.beginPath();
                    ctx.arc(this.x, this.y, ring.radius, 0, Math.PI * 2);
                    ctx.strokeStyle = ring.color;
                    ctx.lineWidth = 1.5;
                    ctx.globalAlpha = this.life * (1 - ring.radius / ring.maxRadius);
                    ctx.stroke();

                    ctx.beginPath();
                    ctx.arc(this.x, this.y, ring.radius, 0, Math.PI * 2);
                    ctx.strokeStyle = ring.color + '30';
                    ctx.lineWidth = 6;
                    ctx.stroke();
                }
            });

            this.burstParticles.forEach(p => {
                if (p.life > 0) {
                    ctx.save();
                    ctx.globalAlpha = p.life * this.life;

                    const gradient = ctx.createRadialGradient(p.x, p.y, 0, p.x, p.y, p.size * 2);
                    gradient.addColorStop(0, p.color);
                    gradient.addColorStop(1, p.color + '00');

                    ctx.beginPath();
                    ctx.arc(p.x, p.y, p.size * 2, 0, Math.PI * 2);
                    ctx.fillStyle = gradient;
                    ctx.fill();
                    ctx.restore();
                }
            });

            ctx.restore();
        }
    }

    function spawnScratchParticles(x, y) {
        const count = Math.floor(Math.random() * 2) + 2;
        for (let i = 0; i < count; i++) {
            particles.push(new Particle(x + (Math.random() - 0.5) * 20, y + (Math.random() - 0.5) * 20, 'scratch'));
        }
    }

    function spawnReleaseParticles() {
        const count = 35;
        for (let i = 0; i < count; i++) {
            const x = Math.random() * width;
            const y = Math.random() * height;
            const p = new Particle(x, y, 'release');
            p.vy = -Math.random() * 2 - 0.3;
            p.vx = (Math.random() - 0.5) * 1.2;
            p.decay = Math.random() * 0.005 + 0.002;
            p.size = Math.random() * 5 + 2.5;
            p.maxSize = p.size;
            particles.push(p);
        }
    }

    for (let i = 0; i < 60; i++) {
        ambientParticles.push(new AmbientParticle());
    }

    // ==================== 音效系统 ====================
    const PENTATONIC = [261.63, 293.66, 329.63, 392.00, 440.00, 523.25, 587.33, 659.25];
    let noteIndex = 0;

    function playNote() {
        if (!sfxEnabled) return;

        const audioCtx = new (window.AudioContext || window.webkitAudioContext)();
        const oscillator = audioCtx.createOscillator();
        const gainNode = audioCtx.createGain();

        oscillator.type = 'sine';
        oscillator.frequency.value = PENTATONIC[noteIndex % PENTATONIC.length];

        const osc2 = audioCtx.createOscillator();
        const gain2 = audioCtx.createGain();
        osc2.type = 'triangle';
        osc2.frequency.value = oscillator.frequency.value * 2;
        gain2.gain.value = 0.1;

        gainNode.gain.setValueAtTime(0, audioCtx.currentTime);
        gainNode.gain.linearRampToValueAtTime(0.3, audioCtx.currentTime + 0.02);
        gainNode.gain.exponentialRampToValueAtTime(0.01, audioCtx.currentTime + 1.5);

        oscillator.connect(gainNode);
        osc2.connect(gain2);
        gain2.connect(gainNode);
        gainNode.connect(audioCtx.destination);

        oscillator.start(audioCtx.currentTime);
        osc2.start(audioCtx.currentTime);
        oscillator.stop(audioCtx.currentTime + 1.5);
        osc2.stop(audioCtx.currentTime + 1.5);

        noteIndex++;
    }

    // ==================== 恢复效果 ====================
    let restoreInterval = null;

    function startRestore() {
        if (restoreInterval) clearInterval(restoreInterval);

        let restoreProgress = 0;
        const restoreSpeed = 0.005;

        restoreInterval = setInterval(() => {
            restoreProgress += restoreSpeed;

            if (restoreProgress >= 1) {
                scratchCtx.globalCompositeOperation = 'source-over';
                scratchCtx.fillStyle = '#FFFFFF';
                scratchCtx.fillRect(0, 0, width, height);
                clearInterval(restoreInterval);
                restoreInterval = null;
                return;
            }

            const pixelCount = Math.floor(width * height * restoreSpeed * 0.06);
            scratchCtx.globalCompositeOperation = 'source-over';

            for (let i = 0; i < pixelCount; i++) {
                const x = Math.random() * width;
                const y = Math.random() * height;
                const size = Math.random() * 20 + 6;

                const gradient = scratchCtx.createRadialGradient(x, y, 0, x, y, size);
                gradient.addColorStop(0, `rgba(255,255,255,${restoreProgress})`);
                gradient.addColorStop(1, 'rgba(255,255,255,0)');

                scratchCtx.fillStyle = gradient;
                scratchCtx.beginPath();
                scratchCtx.arc(x, y, size, 0, Math.PI * 2);
                scratchCtx.fill();
            }
        }, 50);
    }

    // ==================== 鼠标事件 ====================
    document.addEventListener('mousemove', (e) => {
        mouseX = e.clientX;
        mouseY = e.clientY;
        customCursor.style.left = mouseX + 'px';
        customCursor.style.top = mouseY + 'px';

        if (isDragging) {
            scratch(mouseX, mouseY, lastX, lastY);
            lastX = mouseX;
            lastY = mouseY;
        }
    });

    document.addEventListener('mousedown', (e) => {
        if (e.target.classList.contains('audio-btn')) return;

        isDragging = true;
        lastX = e.clientX;
        lastY = e.clientY;
        customCursor.classList.add('dragging');

        playNote();
        clickEffects.push(new ClickEffect(e.clientX, e.clientY));

        if (restoreInterval) {
            clearInterval(restoreInterval);
            restoreInterval = null;
        }

        scratch(e.clientX, e.clientY, e.clientX, e.clientY);
    });

    document.addEventListener('mouseup', () => {
        if (isDragging) {
            isDragging = false;
            customCursor.classList.remove('dragging');
            spawnReleaseParticles();
            startRestore();
        }
    });

    document.addEventListener('touchstart', (e) => {
        if (e.target.classList.contains('audio-btn')) return;
        const touch = e.touches[0];
        isDragging = true;
        lastX = touch.clientX;
        lastY = touch.clientY;
        customCursor.classList.add('dragging');
        playNote();
        clickEffects.push(new ClickEffect(touch.clientX, touch.clientY));
        if (restoreInterval) {
            clearInterval(restoreInterval);
            restoreInterval = null;
        }
        scratch(touch.clientX, touch.clientY, touch.clientX, touch.clientY);
    });

    document.addEventListener('touchmove', (e) => {
        e.preventDefault();
        const touch = e.touches[0];
        mouseX = touch.clientX;
        mouseY = touch.clientY;
        customCursor.style.left = mouseX + 'px';
        customCursor.style.top = mouseY + 'px';
        if (isDragging) {
            scratch(mouseX, mouseY, lastX, lastY);
            lastX = mouseX;
            lastY = mouseY;
        }
    });

    document.addEventListener('touchend', () => {
        if (isDragging) {
            isDragging = false;
            customCursor.classList.remove('dragging');
            spawnReleaseParticles();
            startRestore();
        }
    });

    // ==================== 音频控制 ====================
    bgmBtn.addEventListener('click', () => {
        if (bgmPlaying) {
            bgm.pause();
            bgmBtn.textContent = '🎵 背景音乐';
            bgmBtn.style.opacity = '0.6';
        } else {
            bgm.play().catch(e => console.log('音频播放需要用户交互'));
            bgmBtn.textContent = '🎵 播放中';
            bgmBtn.style.opacity = '1';
        }
        bgmPlaying = !bgmPlaying;
    });

    sfxBtn.addEventListener('click', () => {
        sfxEnabled = !sfxEnabled;
        sfxBtn.textContent = sfxEnabled ? '🎹 音效: 开' : '🎹 音效: 关';
        sfxBtn.style.opacity = sfxEnabled ? '1' : '0.6';
    });

    // ==================== 主渲染循环 ====================
    let renderLoopStarted = false;
    let syncCheckCounter = 0;

    function startRenderLoop() {
        if (renderLoopStarted) return;
        renderLoopStarted = true;
        console.log('🎬 渲染循环已启动');

        function loop() {
            // 每60帧检查一次同步（约1秒）
            syncCheckCounter++;
            if (syncCheckCounter >= 60) {
                maintainSync();
                syncCheckCounter = 0;
            }

            // 1. 绘制线稿到 lineartCanvas
            drawLineartFrame();

            // 2. 用 scratchCanvas 作为 mask
            try {
                const scratchData = scratchCtx.getImageData(0, 0, width, height);
                const lineartData = lineartCtx.getImageData(0, 0, width, height);

                for (let i = 0; i < scratchData.data.length; i += 4) {
                    const alpha = scratchData.data[i] / 255;
                    lineartData.data[i + 3] = Math.floor(alpha * 255);
                }

                lineartCtx.putImageData(lineartData, 0, 0);
            } catch (e) {
                console.error('Mask 应用失败:', e);
            }

            // 3. 清空并绘制粒子
            particleCtx.clearRect(0, 0, width, height);
            clickCtx.clearRect(0, 0, width, height);

            ambientParticles.forEach(p => {
                p.update();
                p.draw(ambientCtx);
            });

            particles = particles.filter(p => {
                p.update();
                if (p.life > 0) {
                    p.draw(particleCtx);
                    return true;
                }
                return false;
            });

            clickEffects = clickEffects.filter(effect => {
                effect.update();
                if (effect.life > 0) {
                    effect.draw(clickCtx);
                    return true;
                }
                return false;
            });

            if (isDragging) {
                spawnScratchParticles(mouseX + (Math.random() - 0.5) * 10, mouseY + (Math.random() - 0.5) * 10);
            }

            requestAnimationFrame(loop);
        }
        loop();
    }

    // ==================== 飘浮符号装饰 ====================
    const symbols = ['卍', '✦', '❋', '✿', '❀', '✧', '◈', '❖'];

    function spawnFloatingSymbol() {
        if (Math.random() > 0.5) return;

        const symbol = symbols[Math.floor(Math.random() * symbols.length)];
        const x = Math.random() * width;
        const y = height + 30;
        const size = Math.random() * 14 + 10;
        const speed = Math.random() * 0.35 + 0.12;
        const opacity = Math.random() * 0.18 + 0.06;

        const el = document.createElement('div');
        el.textContent = symbol;
        el.style.cssText = `
            position: absolute;
            left: ${x}px;
            top: ${y}px;
            font-size: ${size}px;
            color: rgba(212, 175, 55, ${opacity});
            pointer-events: none;
            z-index: 2;
            text-shadow: 0 0 6px rgba(212, 175, 55, 0.15);
            transition: none;
        `;
        container.appendChild(el);

        let posY = y;
        let wobble = Math.random() * Math.PI * 2;

        function float() {
            posY -= speed;
            wobble += 0.02;
            const wobbleX = Math.sin(wobble) * 12;
            el.style.top = posY + 'px';
            el.style.left = (x + wobbleX) + 'px';
            el.style.opacity = Math.max(0, (posY / height) * opacity);

            if (posY > -50) {
                requestAnimationFrame(float);
            } else {
                el.remove();
            }
        }
        float();
    }

    setInterval(spawnFloatingSymbol, 1200);

    console.log('🎨 敦煌时空走廊 - 壁画上色交互体验已加载');
    console.log('✨ 底层：上色壁画 | 上层：线稿');
    console.log('🖌️ 刮擦线稿，为千年壁画上色');
    </script>
</body>
